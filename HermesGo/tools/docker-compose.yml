services:
  ollama:
    image: ollama/ollama:latest
    container_name: hermesgo-ollama
    command: ["serve"]
    ports:
      - "11434:11434"
    volumes:
      - ../data/ollama:/root/.ollama
    restart: unless-stopped

  hermes:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermesgo-hermes
    command: ["hermes", "start"]
    depends_on:
      - ollama
    ports:
      - "3000:3000"
    volumes:
      - ../data/hermes:/root/.hermes
    stdin_open: true
    tty: true
    restart: unless-stopped
